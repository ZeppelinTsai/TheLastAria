html/head_include="<style>#orientation-lock{align-items:center;background:#050507;color:#fff;display:none;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif;inset:0;justify-content:center;letter-spacing:.04em;position:fixed;text-align:center;z-index:2147483647}#orientation-lock .orientation-card{padding:28px 32px}#orientation-lock .orientation-icon{font-size:44px;margin-bottom:14px}#orientation-lock .orientation-title{font-size:24px;font-weight:700;margin-bottom:8px}#orientation-lock .orientation-copy{color:rgba(255,255,255,.76);font-size:15px;line-height:1.7}@media (orientation:portrait){#orientation-lock{display:flex}}</style><div id='orientation-lock' aria-live='polite'><div class='orientation-card'><div class='orientation-icon'>↻</div><div class='orientation-title'>請旋轉裝置</div><div class='orientation-copy'>此遊戲需要橫向畫面<br>將手機轉為橫向後即可繼續</div></div></div><script>(function(){function applyOrientationGate(){var gate=document.getElementById('orientation-lock');var canvas=document.getElementById('canvas');if(!gate)return;var portrait=window.innerHeight>window.innerWidth;gate.style.display=portrait?'flex':'none';if(canvas){canvas.style.pointerEvents=portrait?'none':'auto';}}function tryLockLandscape(){if(screen.orientation&&screen.orientation.lock){screen.orientation.lock('landscape').catch(function(){});}}window.addEventListener('load',applyOrientationGate);window.addEventListener('resize',applyOrientationGate);window.addEventListener('orientationchange',function(){setTimeout(applyOrientationGate,120);});window.addEventListener('pointerdown',tryLockLandscape,{once:true});})();</script>"
