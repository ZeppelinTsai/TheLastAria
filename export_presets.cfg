html/head_include="<style>html,body{margin:0;overflow:hidden;background:#050507}#canvas{transform-origin:center center}@media (pointer:coarse) and (orientation:portrait){#canvas{height:100vw!important;left:50%!important;max-height:none!important;max-width:none!important;position:fixed!important;top:50%!important;width:100vh!important}}</style><script>(function(){var MOBILE_QUERY='(pointer: coarse)';function getAngle(){if(screen.orientation&&typeof screen.orientation.angle==='number')return screen.orientation.angle;if(typeof window.orientation==='number')return window.orientation;return 0;}function isMobile(){return window.matchMedia&&window.matchMedia(MOBILE_QUERY).matches;}function isPortrait(){return window.innerHeight>window.innerWidth;}function applyFixedLandscape(){var canvas=document.getElementById('canvas');if(!canvas)return;var rotate=false;if(isMobile()&&isPortrait()){var angle=((getAngle()%360)+360)%360;var turnsUpsideDown=angle===180;canvas.style.transform='translate(-50%, -50%) rotate('+(turnsUpsideDown?'-90deg':'90deg')+')';canvas.style.width='100vh';canvas.style.height='100vw';canvas.style.position='fixed';canvas.style.left='50%';canvas.style.top='50%';canvas.style.maxWidth='none';canvas.style.maxHeight='none';rotate=true;}if(!rotate){canvas.style.transform='';canvas.style.width='';canvas.style.height='';canvas.style.position='';canvas.style.left='';canvas.style.top='';canvas.style.maxWidth='';canvas.style.maxHeight='';}}function tryLockLandscape(){if(screen.orientation&&screen.orientation.lock){screen.orientation.lock('landscape').catch(function(){});}}window.addEventListener('load',applyFixedLandscape);window.addEventListener('resize',applyFixedLandscape);window.addEventListener('orientationchange',function(){setTimeout(applyFixedLandscape,120);});window.addEventListener('pointerdown',tryLockLandscape,{once:true});})();</script>"
